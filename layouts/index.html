{{ define "main" }}
<div class="row">
    <div class="col-md-9">
        <h1 class="accent">workshop log</h1>
        <p class="lead">Documenting builds, weaves, and Linux configurations.</p>
        <hr style="border-color: #30363d;">
        
        {{ range .Paginator.Pages }}
        <div class="post-item" style="margin-bottom: 40px;">
            <h2><a href="{{ .Permalink }}" style="color: #ffffff;">{{ .Title }}</a></h2>
            <p class="text-muted">{{ .Date.Format "January 2, 2006" }}</p>
            <p>{{ .Summary }}</p>
            <a href="{{ .Permalink }}" style="color: #00bcd4; font-weight: bold;">Read Entry →</a>
        </div>
        {{ end }}
        
        {{ template "_internal/pagination.html" . }}
    </div>
</div>
{{ end }}
